<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>MKWEB</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1 id="title">MKWEB</h1>

    <div id="time"></div>
    <div id="date"></div>

    <div class="search-box">
        <input type="text" id="search" placeholder="Suche...">
        <button onclick="search()">🔍</button>
    </div>

    <!-- Quick Pick -->
    <div class="quick-pick">
        <h2>⚡ Quick Pick</h2>

        <input id="quickName" placeholder="Name">
        <input id="quickURL" placeholder="URL">
        <input id="quickIcon" placeholder="Emoji/Icon (🔥, 🎮)">
        <input id="quickColor" type="color">

        <button onclick="addQuickPick()">Add</button>

        <div id="quickList"></div>
    </div>

    <!-- Custom Panel -->
    <div class="custom-panel">
        <h2>🎨 Customize</h2>

        <label>Title:</label>
        <input id="customTitle">

        <label>Background:</label>
        <input type="color" id="bgColor">

        <label>Accent:</label>
        <input type="color" id="accentColor">

        <button onclick="applySettings()">Apply</button>
    </div>

    <button id="themeToggle">🌙</button>

</div>

<script src="script.js"></script>
</body>
</html>
