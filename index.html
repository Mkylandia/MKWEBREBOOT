<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MKWEB | Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<div class="overlay" id="settingsOverlay">
    <div class="settings-modal">
        <button class="close-btn" onclick="toggleSettings()">✕</button>
        <h2>🎨 Personalisierung</h2>
        
        <div class="settings-grid">
            <section>
                <h3>Quick Pick hinzufügen</h3>
                <input id="quickName" placeholder="Name (z.B. YouTube)">
                <input id="quickURL" placeholder="URL (https://...)">
                <input id="quickIcon" placeholder="Emoji (🔥, 🎮, 🌐)">
                <input id="quickColor" type="color" value="#6366f1">
                <button onclick="addQuickPick()" class="btn-primary">Hinzufügen</button>
            </section>

            <section>
                <h3>Design & Titel</h3>
                <label>Dashboard Titel:</label>
                <input id="customTitle" placeholder="Dein Titel">
                <label>Akzentfarbe:</label>
                <input type="color" id="accentColor" value="#6366f1">
                <button onclick="applySettings()" class="btn-primary">Speichern</button>
            </section>
        </div>
    </div>
</div>

<div class="main-container">
    <header>
        <h1 id="title">MKWEB</h1>
        <div class="clock-container">
            <div id="time">00:00:00</div>
            <div id="date">Montag, 1. Januar</div>
        </div>
    </header>

    <div class="search-section">
        <div class="search-box">
            <input type="text" id="search" placeholder="Suchen mit Google..." autocomplete="off">
            <button onclick="search()">🔍</button>
        </div>
    </div>

    <nav id="quickList" class="quick-grid">
        </nav>

    <div class="floating-controls">
        <button id="themeToggle" title="Design wechseln">🌙</button>
        <button id="settingsToggle" onclick="toggleSettings()" title="Einstellungen">⚙️</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
