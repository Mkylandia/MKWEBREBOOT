<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MKWEB | Ultra Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark">
    <div class="blob-cont">
        <div class="blob"></div>
        <div class="blob"></div>
        <div class="blob"></div>
    </div>

    <div class="overlay" id="settingsOverlay" onclick="closeSettings(event)">
        <div class="settings-modal" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h2>Control Center</h2>
                <button class="close-btn" onclick="toggleSettings()">✕</button>
            </div>
            
            <div class="settings-content">
                <section>
                    <h3>⚡ Quick-Presets</h3>
                    <div id="presetContainer" class="preset-grid"></div>
                    
                    <h3>➕ Eigener Link</h3>
                    <div class="input-group">
                        <input id="quickName" placeholder="Name">
                        <input id="quickURL" placeholder="URL (google.de)">
                        <div class="emoji-picker" id="emojiPicker">
                            </div>
                        <input id="quickColor" type="color" value="#6366f1">
                        <button onclick="addQuickPick()" class="btn-add">Hinzufügen</button>
                    </div>
                </section>

                <section class="divider-left">
                    <h3>🎨 Design & Feel</h3>
                    <label>Dashboard Titel</label>
                    <input id="customTitle" placeholder="Titel..." oninput="liveUpdate()">
                    
                    <label>Akzentfarbe</label>
                    <input type="color" id="accentColor" oninput="liveUpdate()">
                    
                    <div class="info-card">
                        <p>💡 <b>Tipp:</b> Rechtsklick auf Icons löscht diese sofort.</p>
                    </div>
                </section>
            </div>
        </div>
    </div>

    <div class="container">
        <header>
            <div id="time">00:00</div>
            <h1 id="title">MKWEB</h1>
            <div id="date">Lädt...</div>
        </header>

        <div class="search-container">
            <div class="search-bar">
                <input type="text" id="search" placeholder="Was suchst du?" autocomplete="off">
                <button onclick="search()"><span>Go</span></button>
            </div>
        </div>

        <main id="quickList" class="icon-grid">
            </main>

        <nav class="dock">
            <button onclick="toggleTheme()" class="dock-item" title="Design">🌓</button>
            <button onclick="toggleSettings()" class="dock-item" title="Settings">⚙️</button>
        </nav>
    </div>

    <script src="script.js"></script>
</body>
</html>
